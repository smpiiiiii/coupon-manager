<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="回数券管理">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>回数券管理SaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e1a;--surface:#131829;--card:#1a2035;--border:#252d44;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#38bdf8;--accent2:#0ea5e9;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--purple:#a78bfa;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
html{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP','Inter',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
/* ログイン */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;gap:20px}
.login-screen .logo{font-size:48px}.login-screen h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-screen .sub{font-size:11px;color:var(--text3);letter-spacing:2px;margin-bottom:16px}
.login-input{width:100%;max-width:280px;background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 18px;color:var(--text);font-size:18px;font-weight:700;text-align:center;outline:none;letter-spacing:4px}
.login-input:focus{border-color:var(--accent)}.login-input::placeholder{color:var(--text3);font-size:13px;letter-spacing:0}
.login-btn{width:100%;max-width:280px;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer}.login-btn:active{transform:scale(.96)}
.login-error{color:var(--red);font-size:12px;font-weight:700;min-height:18px}
/* ヘッダー */
.header-bar{padding:12px 16px 8px;flex-shrink:0}
.header-bar h1{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.header-bar .sub{font-size:9px;color:var(--text3);letter-spacing:1.5px}
/* スクロール */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px 14px;overscroll-behavior:contain}
/* タブバー */
.tab-bar{display:flex;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(6px + var(--safe-bottom))}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;color:var(--text3);transition:color .2s}
.tab-item.active{color:var(--accent)}.tab-item .icon{font-size:18px;line-height:1}.tab-item .label{font-size:8px;font-weight:700}
/* アラート */
.alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.alert-card{border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .12s}
.alert-card:active{transform:scale(.97)}.alert-card .a-icon{font-size:16px}.alert-card .a-info{flex:1}.alert-card .a-label{font-size:10px;font-weight:700;opacity:.8}.alert-card .a-count{font-size:18px;font-weight:900;line-height:1}
.a-1m{background:linear-gradient(135deg,rgba(234,179,8,.12),rgba(234,179,8,.04));border:1px solid rgba(234,179,8,.25);color:#fbbf24}
.a-3m{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(249,115,22,.04));border:1px solid rgba(249,115,22,.25);color:#fb923c}
.a-6m{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.04));border:1px solid rgba(239,68,68,.25);color:#f87171}
.a-exp{background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(167,139,250,.04));border:1px solid rgba(167,139,250,.25);color:#a78bfa}
.a-bday{background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(56,189,248,.04));border:1px solid rgba(56,189,248,.25);color:#38bdf8}
.a-appt{background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(34,197,94,.04));border:1px solid rgba(34,197,94,.25);color:#22c55e}
/* 統計 */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat .num{font-size:18px;font-weight:900;color:var(--accent)}.stat .lbl{font-size:8px;color:var(--text3);margin-top:1px}
/* 検索 */
.toolbar{display:flex;gap:8px;margin-bottom:12px;position:sticky;top:0;z-index:10;padding:4px 0;background:var(--bg)}
.toolbar input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:13px;outline:none}
.toolbar input:focus{border-color:var(--accent)}.toolbar input::placeholder{color:var(--text3)}
.btn-add{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}.btn-add:active{transform:scale(.95)}
/* 顧客カード */
.c-list{display:flex;flex-direction:column;gap:8px}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:transform .12s}.c-card:active{transform:scale(.98)}
.c-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}.c-name{font-size:14px;font-weight:700}
.c-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px}
.b-ok{background:rgba(34,197,94,.12);color:var(--green)}.b-1m{background:rgba(234,179,8,.12);color:#fbbf24}.b-3m{background:rgba(249,115,22,.12);color:#fb923c}.b-6m{background:rgba(239,68,68,.12);color:#f87171}.b-new{background:rgba(148,163,184,.1);color:var(--text3)}
.c-meta{font-size:10px;color:var(--text3);margin-bottom:6px}.c-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(56,189,248,.1);color:var(--accent);border:1px solid rgba(56,189,248,.15)}
.chip.empty{background:rgba(100,116,139,.08);color:var(--text3);border-color:transparent}
/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;backdrop-filter:blur(4px)}.modal-overlay.show{display:block}
.modal{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:420px;background:var(--bg);z-index:201;transform:translateX(100%);transition:transform .25s ease;display:none;flex-direction:column;padding-top:var(--safe-top)}
.modal.show{display:flex;transform:translateX(0)}
.modal-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header .back{background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;padding:4px 8px 4px 0}
.modal-header h2{font-size:15px;font-weight:900;flex:1}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
/* フォーム */
.fg{margin-bottom:12px}.fg label{display:block;font-size:10px;color:var(--text3);font-weight:700;margin-bottom:3px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent)}.fg textarea{resize:none;height:60px}.fg select{appearance:none}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}.btn-primary:active{transform:scale(.97)}
.btn-danger{width:100%;padding:10px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px}
/* 回数券 */
.t-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.t-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.t-type{font-size:13px;font-weight:900;color:var(--accent)}.t-date{font-size:9px;color:var(--text3)}
.t-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px}.t-bar .fill{height:100%;border-radius:3px}
.t-bottom{display:flex;justify-content:space-between;align-items:center}.t-remain{font-size:11px;font-weight:700;color:var(--text2)}
.btn-use{padding:8px 14px;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer}.btn-use:active{transform:scale(.95)}.btn-use:disabled{opacity:.3}
.btn-sm{background:none;border:none;color:var(--text3);font-size:10px;cursor:pointer;padding:4px}
.ticket-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.tt-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:12px 2px;text-align:center;cursor:pointer;font-weight:900;font-size:15px;color:var(--text3)}.tt-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.06)}
.tt-btn span{display:block;font-size:8px;font-weight:500;margin-top:2px}
/* レポート */
.chart-bar{display:flex;align-items:flex-end;gap:4px;height:140px;padding:8px 0;margin-bottom:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s}
.bar-label{font-size:7px;color:var(--text3);white-space:nowrap}
.bar-val{font-size:8px;font-weight:700;color:var(--text2)}
/* 設定 */
.settings-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}.settings-item:active{transform:scale(.98)}
.settings-item .s-label{font-size:13px;font-weight:700}.settings-item .s-value{font-size:12px;color:var(--text3)}
/* セクション */
.sec-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.v-list{display:flex;flex-direction:column;gap:3px}.v-item{font-size:10px;color:var(--text2);padding:6px 8px;background:var(--card);border-radius:6px;border:1px solid var(--border)}
.v-item .v-memo{color:var(--accent);font-size:9px;margin-top:2px}.v-item .v-staff{color:var(--purple);font-size:9px}
.empty{text-align:center;padding:40px 16px;color:var(--text3)}.empty .e-icon{font-size:36px;margin-bottom:8px}.empty p{font-size:12px;line-height:1.6}
@media(max-width:360px){.ticket-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- トップ画面（未ログイン） -->
  <div id="topScreen" class="login-screen">
    <div class="logo">💆</div><h1>回数券管理</h1><div class="sub">COUPON TICKET MANAGER</div>
    <div id="topHistory" style="width:100%;max-width:320px"></div>
    <button class="login-btn" onclick="openCreateStore()" style="max-width:320px">＋ 新しい店舗を作成</button>
    <button class="login-btn" onclick="openJoinStore()" style="max-width:320px;background:linear-gradient(135deg,#64748b,#475569)">🔗 URLで参加する</button>
    <button id="installBtnLogin" class="login-btn" style="display:none;max-width:320px;margin-top:8px;background:linear-gradient(135deg,#a78bfa,#7c3aed)" onclick="doInstall()">📲 アプリをインストール</button>
  </div>
  <!-- 店舗ログイン画面 -->
  <div id="loginScreen" class="login-screen" style="display:none">
    <div class="logo">🔒</div><h1 id="loginStoreName">ログイン</h1><div class="sub" id="loginStoreSub">パスコードを入力してください</div>
    <div class="fg" style="width:100%;max-width:280px"><label>あなたの名前</label><input id="loginUserName" placeholder="田中" style="text-align:center;font-size:16px" autocomplete="off"></div>
    <input type="password" class="login-input" id="passcodeInput" placeholder="パスコード" maxlength="20" autocomplete="off">
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <button style="background:none;border:none;color:var(--text3);font-size:12px;margin-top:8px;cursor:pointer" onclick="backToTop()">← トップへ戻る</button>
  </div>
  <!-- メインアプリ -->
  <div id="mainApp" style="display:none">
    <div class="header-bar"><h1 id="storeTitle">💆 店舗名</h1><div class="sub" id="storeSub">COUPON TICKET MANAGER</div></div>
    <div class="scroll-area" id="scrollArea"></div>
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('home',this)"><span class="icon">🏠</span><span class="label">ホーム</span></div>
      <div class="tab-item" onclick="switchTab('alerts',this)"><span class="icon" id="alertTabIcon">🔔</span><span class="label">アラート</span></div>
      <div class="tab-item" onclick="switchTab('report',this)"><span class="icon">📊</span><span class="label">レポート</span></div>
      <div class="tab-item" onclick="switchTab('settings',this)"><span class="icon">⚙️</span><span class="label">設定</span></div>
    </div>
  </div>
</div>

<!-- モーダル: 顧客追加 -->
<div class="modal-overlay" id="addOverlay" onclick="closeModal('add')"></div>
<div class="modal" id="addModal">
  <div class="modal-header"><button class="back" onclick="closeModal('add')">← 戻る</button><h2>新規顧客</h2></div>
  <div class="modal-body">
    <div class="fg"><label>お名前 *</label><input id="addName" placeholder="田中花子"></div>
    <div class="fg"><label>電話番号</label><input id="addPhone" placeholder="090-1234-5678" type="tel"></div>
    <div class="fg"><label>誕生日</label><input id="addBirthday" type="date"></div>
    <div class="fg"><label>メモ</label><textarea id="addMemo" placeholder="肩こり、腰痛"></textarea></div>
    <button class="btn-primary" onclick="addCustomer()">登録する</button>
  </div>
</div>

<!-- モーダル: 顧客詳細 -->
<div class="modal-overlay" id="detailOverlay" onclick="closeModal('detail')"></div>
<div class="modal" id="detailModal">
  <div class="modal-header"><button class="back" onclick="closeModal('detail')">← 戻る</button><h2 id="detailTitle">詳細</h2></div>
  <div class="modal-body" id="detailBody"></div>
</div>

<!-- モーダル: 回数券追加 -->
<div class="modal-overlay" id="ticketOverlay" onclick="closeModal('ticket')"></div>
<div class="modal" id="ticketModal">
  <div class="modal-header"><button class="back" onclick="closeModal('ticket')">← 戻る</button><h2>回数券を追加</h2></div>
  <div class="modal-body">
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px" id="ticketForName"></p>
    <div class="ticket-grid" id="ticketGrid"></div>
    <button class="btn-primary" id="ticketBtn" onclick="addTicket()" disabled>追加する</button>
  </div>
</div>

<!-- モーダル: 施術利用 -->
<div class="modal-overlay" id="useOverlay" onclick="closeModal('use')"></div>
<div class="modal" id="useModal">
  <div class="modal-header"><button class="back" onclick="closeModal('use')">← 戻る</button><h2>✓ 利用記録</h2></div>
  <div class="modal-body">
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px" id="useInfo"></p>
    <div class="fg"><label>施術メモ</label><textarea id="useMemo" placeholder="肩こり重め、ストレッチ多め" style="height:80px"></textarea></div>
    <div class="fg"><label>担当スタッフ</label><select id="useStaff"><option value="">選択なし</option></select></div>
    <button class="btn-primary" onclick="confirmUse()">利用を記録する</button>
  </div>
</div>

<!-- モーダル: CSVインポート -->
<div class="modal-overlay" id="csvOverlay" onclick="closeModal('csv')"></div>
<div class="modal" id="csvModal">
  <div class="modal-header"><button class="back" onclick="closeModal('csv')">← 戻る</button><h2>📤 CSVインポート</h2></div>
  <div class="modal-body">
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.6">
      形式: <b>名前, 電話番号, メモ, 誕生日</b>（1行1顧客）<br>
      ヘッダー行があれば自動でカラムを判別します<br>
      <code style="font-size:10px;color:var(--accent);background:var(--card);padding:4px 8px;border-radius:4px;display:block;margin-top:4px">田中花子,090-1234-5678,肩こり,1990-05-15</code>
    </div>
    <div class="fg"><label>データ貼り付け（CSV/TSV）</label><textarea id="csvData" style="height:140px;font-size:11px;font-family:monospace" placeholder="名前,電話番号,メモ,誕生日"></textarea></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <label style="flex:1;display:block;text-align:center;padding:10px;background:var(--card);border:1px dashed var(--border);border-radius:10px;cursor:pointer;font-size:12px;color:var(--text2);font-weight:700">📁 CSVファイルを選択<input type="file" id="csvFile" accept=".csv,.tsv,.txt" style="display:none" onchange="loadCsvFile(this)"></label>
      <select id="csvEncoding" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;color:var(--text);font-size:11px;min-width:100px" onchange="reloadCsvWithEncoding()">
        <option value="auto">自動判定</option>
        <option value="UTF-8">UTF-8</option>
        <option value="Shift_JIS">Shift_JIS</option>
        <option value="EUC-JP">EUC-JP</option>
      </select>
    </div>
    <div id="csvEncodingInfo" style="font-size:10px;color:var(--accent);margin-bottom:8px"></div>
    <div id="csvPreview" style="margin-bottom:12px"></div>
    <div id="csvError" style="color:var(--red);font-size:11px;margin-bottom:8px"></div>
    <button class="btn-primary" onclick="doCsvImport()">インポート実行</button>
  </div>
</div>

<!-- モーダル: 設定詳細 -->
<div class="modal-overlay" id="configOverlay" onclick="closeModal('config')"></div>
<div class="modal" id="configModal">
  <div class="modal-header"><button class="back" onclick="closeModal('config')">← 戻る</button><h2 id="configTitle">設定</h2></div>
  <div class="modal-body" id="configBody"></div>
</div>

<script>
let D={customers:[],alerts:{},settings:{},name:'',role:'staff',hasLine:false};
let authToken='';
let roomId='';
let myRole='staff';
let selCid=null,selType=null,useCid=null,useTid=null,currentTab='home';

// デバイスID生成
let deviceId=localStorage.getItem('cp_deviceId')||'';
if(!deviceId){deviceId='dev_'+Math.random().toString(36).substr(2,9)+Date.now().toString(36);localStorage.setItem('cp_deviceId',deviceId);}

// APIベースパス
function apiBase(){return `/api/store/${roomId}`;}

async function api(path,m='GET',b=null){
  const o={method:m,headers:{'Content-Type':'application/json','X-Auth-Token':authToken}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(path,o);
  if(r.status===401){authToken='';localStorage.removeItem('cp_token_'+roomId);showLogin();throw new Error('auth');}
  return r.json();
}

// 画面制御
function showTop(){document.getElementById('topScreen').style.display='flex';document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='none';renderHistory();}
function showLogin(){document.getElementById('topScreen').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';}
function showApp(){document.getElementById('topScreen').style.display='none';document.getElementById('loginScreen').style.display='none';const m=document.getElementById('mainApp');m.style.display='flex';m.style.flexDirection='column';m.style.height='100%';}
function backToTop(){roomId='';history.pushState(null,'','/');showTop();}

// 店舗履歴管理
function getHistory(){try{return JSON.parse(localStorage.getItem('cp_history')||'[]');}catch{return [];}}
function addHistory(id,name){let h=getHistory();h=h.filter(x=>x.id!==id);h.unshift({id,name,lastAccess:new Date().toISOString()});if(h.length>10)h=h.slice(0,10);localStorage.setItem('cp_history',JSON.stringify(h));}
function renderHistory(){
  const h=getHistory();
  const el=document.getElementById('topHistory');
  if(!h.length){el.innerHTML='';return;}
  el.innerHTML='<div style="font-size:11px;color:var(--text3);font-weight:700;margin-bottom:6px">📋 最近の店舗</div>'+h.map(x=>

function openCreateStore(){

  document.getElementById('configBody').innerHTML=`
    <div class="fg"><label>店舗名 *</label><input id="createName" placeholder="B-care / 〇〇整体院"></div>

    <div style="font-size:10px;color:var(--text3);margin-bottom:12px;line-height:1.6">⚠️ パスコードはスタッフ全員で共有します。<br>URLを知っている人だけがアクセスできます。</div>

async function createStore(){
  const name=document.getElementById('createName').value.trim();
  const admin=document.getElementById('createAdmin').value.trim();
  const pass=document.getElementById('createPass').value.trim();
  if(!name){alert('店舗名を入力してください');return;}
  if(!pass||pass.length<4){alert('パスコードは4文字以上');return;}
  try{
    const r=await fetch('/api/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,creator:admin,passcode:pass,deviceId})});
    const j=await r.json();
    if(j.error){alert(j.error);return;}
    roomId=j.id;authToken=j.token;
    localStorage.setItem('cp_token_'+roomId,authToken);
    addHistory(roomId,name);
    closeModal('config');
    history.pushState(null,'','/store/'+roomId);
    showApp();
    document.getElementById('storeTitle').textContent='💆 '+name;
    load();
    // URL共有案内
    setTimeout(()=>{alert('店舗を作成しました！\n\nスタッフには以下のURLとパスコードを共有してください:\n'+location.href);},500);
  }catch{alert('通信エラー');}
}

function openJoinStore(){

  document.getElementById('configBody').innerHTML=`

async function checkAndJoin(){
  const id=document.getElementById('joinId').value.trim();
  if(!id){alert('IDを入力');return;}
  try{
    const r=await fetch('/api/check-room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:id})});
    const j=await r.json();
    if(j.error){alert('見つかりません');return;}
    closeModal('config');

// 店舗にアクセス
function enterStore(id){
  roomId=id;
  history.pushState(null,'','/store/'+id);
  // 保存済みトークンがあるか確認
  authToken=localStorage.getItem('cp_token_'+id)||'';
  if(authToken){tryLoadRoom();}
  else{showLoginForRoom();}
}
function showLoginForRoom(){
  // 店舗名をAPIで取得
  fetch('/api/check-room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId})})
  .then(r=>r.json()).then(j=>{
    document.getElementById('loginStoreName').textContent=j.name||'ログイン';
    document.getElementById('loginStoreSub').textContent='パスコードを入力してください';
  }).catch(()=>{});
  showLogin();
}
async function tryLoadRoom(){
  try{D=await api(apiBase()+'/data');myRole=D.role||'staff';document.getElementById('storeTitle').textContent='💆 '+D.name;addHistory(roomId,D.name);showApp();renderTab();}
  catch{authToken='';localStorage.removeItem('cp_token_'+roomId);showLoginForRoom();}
}

// ログイン
async function doLogin(){
  const pc=document.getElementById('passcodeInput').value;
  const userName=document.getElementById('loginUserName').value.trim();
  if(!pc){document.getElementById('loginError').textContent='パスコードを入力';return;}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId,passcode:pc,userName,deviceId})});
    const j=await r.json();
    if(j.error){document.getElementById('loginError').textContent=j.error;return;}
    authToken=j.token;myRole=j.role||'staff';
    localStorage.setItem('cp_token_'+roomId,authToken);
    document.getElementById('storeTitle').textContent='💆 '+(j.name||'');
    addHistory(roomId,j.name||'');
    showApp();load();
  }catch{document.getElementById('loginError').textContent='通信エラー';}
}
document.getElementById('passcodeInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// データ読み込み

let selectMode=false;
let selectedCids=new Set();

function toggleSelectMode(){
  selectMode=!selectMode;
  if(!selectMode)selectedCids.clear();
  renderTab();
}
function selectAll(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let cs=D.customers;
  if(q)cs=cs.filter(c=>c.name.toLowerCase().includes(q)||(c.phone||'').includes(q));
  cs.forEach(c=>selectedCids.add(c.cid));
  renderCustomerList();
}
function deselectAll(){selectedCids.clear();renderCustomerList();}
function toggleSelect(cid){if(selectedCids.has(cid))selectedCids.delete(cid);else selectedCids.add(cid);renderCustomerList();}
function updateSelectCount(){
  const el=document.getElementById('selectCount');
  if(el)el.textContent=selectedCids.size+'件選択中';
}
async function deleteSelected(){
  if(!selectedCids.size){alert('顧客を選択してください');return;}
  if(!confirm(selectedCids.size+'件の顧客を削除しますか？\n（この操作は取り消せません）'))return;
  const r=await api(apiBase()+'/customer/bulk-delete','POST',{cids:[...selectedCids]});
  if(r.error){alert(r.error);return;}
  alert(r.deleted+'件削除しました');selectMode=false;selectedCids.clear();await load();
}
async function deleteAll(){
  if(!D.customers.length){alert('顧客がいません');return;}
  if(!confirm('全'+D.customers.length+'件の顧客データを削除しますか？\n⚠ この操作は取り消せません！'))return;
  if(!confirm('本当に全件削除しますか？\nもう一度確認してください'))return;
  const r=await api(apiBase()+'/customer/bulk-delete','POST',{cids:[]});
  if(r.error){alert(r.error);return;}
  alert(r.deleted+'件削除しました');selectMode=false;selectedCids.clear();await load();
}

function renderCustomerList(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let cs=[...D.customers];
  if(q)cs=cs.filter(c=>c.name.toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.memo||'').toLowerCase().includes(q));
  cs.sort((a,b)=>{if(!a.lastVisit&&!b.lastVisit)return 0;if(!a.lastVisit)return -1;if(!b.lastVisit)return 1;return new Date(a.lastVisit)-new Date(b.lastVisit);});
  const el=document.getElementById('customerList');if(!el)return;
  if(!cs.length){el.innerHTML=`<div class="empty"><div class="e-icon">👥</div><p>${q?'該当なし':'まだ顧客がいません'}</p></div>`;return;}
  el.innerHTML=cs.map(c=>{
    const dd=c._diffDays||(c.lastVisit?Math.floor((Date.now()-new Date(c.lastVisit).getTime())/864e5):null);
    let bc='b-ok',bt='稼働中';
    if(dd===null){bc='b-new';bt='未来店';}else if(dd>=180){bc='b-6m';bt=dd+'日';}else if(dd>=90){bc='b-3m';bt=dd+'日';}else if(dd>=30){bc='b-1m';bt=dd+'日';}else bt=dd+'日前';
    const at=c.tickets.filter(t=>t.remaining>0);
    const chips=at.length?at.map(t=>`<span class="chip">${t.type}回券 残${t.remaining}</span>`).join(''):'<span class="chip empty">回数券なし</span>';
    let extra='';if(c.nextAppointment)extra+=`<span class="chip" style="background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.2)">📅 ${c.nextAppointment}</span>`;
    const checked=selectedCids.has(c.cid);
    const checkbox=selectMode?`<div style="display:flex;align-items:center;padding-right:10px;flex-shrink:0" onclick="event.stopPropagation();toggleSelect('${c.cid}')"><div style="width:22px;height:22px;border-radius:6px;border:2px solid ${checked?'var(--accent)':'var(--border)'};background:${checked?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:all .15s">${checked?'✓':''}</div></div>`:'';
    return`<div class="c-card" style="display:flex;align-items:stretch" onclick="${selectMode?`toggleSelect('${c.cid}')`:`openDetail('${c.cid}')`}">${checkbox}<div style="flex:1;min-width:0"><div class="c-top"><span class="c-name">${esc(c.name)}</span><span class="c-badge ${bc}">${bt}</span></div><div class="c-meta">${c.phone?'📞'+esc(c.phone):''}${c.lastVisit?' ・ 最終:'+c.lastVisit:''}</div><div class="c-chips">${chips}${extra}</div></div></div>`;
  }).join('');
  updateSelectCount();
}

// ===== アラートタブ =====
function renderAlertTab(area){
  const a=D.alerts||{};
  let h='<div class="sec-title">🔔 アラート一覧</div>';
  const sections=[
    {key:'todayAppt',icon:'📅',label:'今日の予約',cls:'a-appt'},
    {key:'birthdayMonth',icon:'🎂',label:'今月の誕生日',cls:'a-bday'},
    {key:'expiring',icon:'⏰',label:'期限切れ間近',cls:'a-exp'},
    {key:'month6',icon:'🔴',label:'半年以上未来店',cls:'a-6m'},
    {key:'month3',icon:'🟠',label:'3ヶ月以上未来店',cls:'a-3m'},
    {key:'month1',icon:'🟡',label:'1ヶ月以上未来店',cls:'a-1m'},
  ];
  let hasAny=false;
  sections.forEach(s=>{
    const list=a[s.key]||[];if(!list.length)return;hasAny=true;
    h+=`<div style="font-size:11px;font-weight:700;margin:12px 0 6px;color:var(--text2)">${s.icon} ${s.label}（${list.length}）</div>`;
    list.forEach(c=>{
      let info='';
      if(s.key==='expiring')info=`${c._ticketType}回券 残${c._daysLeft}日`;
      else if(s.key==='birthdayMonth')info=`🎂 ${c.birthday}`;
      else if(s.key==='todayAppt')info=`📅 ${c.nextAppointment}`;
      else info=c.lastVisit?`最終来店: ${c.lastVisit}`:'';
      h+=`<div class="c-card" style="border-left:3px solid" onclick="openDetail('${c.cid}')"><div class="c-top"><span class="c-name">${esc(c.name)}</span></div><div class="c-meta">${info}</div></div>`;
    });
  });
  if(!hasAny)h+='<div class="empty"><div class="e-icon">✅</div><p>アラートはありません</p></div>';
  area.innerHTML=h;
}

// ===== レポートタブ =====
async function renderReport(area){
  area.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)"><div class="spinner" style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px"></div>読み込み中...</div>';
  try{
    const r=await api(apiBase()+'/report');
    const m=r.monthly;const months=Object.keys(m).sort().slice(-6);
    if(!months.length){area.innerHTML='<div class="empty"><div class="e-icon">📊</div><p>まだデータがありません</p></div>';return;}
    const settings=D.settings||{};
    const maxP=Math.max(...months.map(k=>m[k].purchased),1);const maxU=Math.max(...months.map(k=>m[k].used),1);const maxVal=Math.max(maxP,maxU);
    let chartH='<div class="sec-title">📊 月別レポート（直近6ヶ月）</div><div class="chart-bar">';
    months.forEach(k=>{
      const p=m[k].purchased,u=m[k].used;
      const ph=Math.round(p/maxVal*100),uh=Math.round(u/maxVal*100);
      chartH+=`<div class="bar-col"><div class="bar-val">${p}</div><div class="bar-fill" style="height:${ph}%;background:var(--accent)"></div><div class="bar-fill" style="height:${uh}%;background:var(--green)"></div><div class="bar-val">${u}</div><div class="bar-label">${k.slice(5)}</div></div>`;
    });
    chartH+='</div><div style="display:flex;gap:12px;justify-content:center;margin-bottom:16px;font-size:10px"><span style="color:var(--accent)">■ 販売数</span><span style="color:var(--green)">■ 消化数</span></div>';
    // 売上合計
    let totalRev=0;months.forEach(k=>{totalRev+=m[k].revenue||0;});
    chartH+=`<div class="stats"><div class="stat"><div class="num" style="font-size:16px">¥${totalRev.toLocaleString()}</div><div class="lbl">期間売上</div></div></div>`;
    // 月別詳細
    chartH+='<div class="sec-title" style="margin-top:16px">📋 月別詳細</div>';
    months.reverse().forEach(k=>{
      const d=m[k];
      chartH+=`<div class="t-card"><div class="t-top"><span class="t-type">${k}</span><span class="t-date">¥${(d.revenue||0).toLocaleString()}</span></div><div style="font-size:11px;color:var(--text2)">販売: ${d.purchased}件 ・ 消化: ${d.used}件</div>`;
      if(Object.keys(d.staffCount||{}).length){chartH+=`<div style="font-size:10px;color:var(--purple);margin-top:4px">👥 ${Object.entries(d.staffCount).map(([s,n])=>`${s}:${n}件`).join(' / ')}</div>`;}
      chartH+='</div>';
    });
    area.innerHTML=chartH;
  }catch(e){area.innerHTML='<div class="empty"><p>レポート取得エラー</p></div>';}
}

// 最後に読み込んだファイルを保持（エンコーディング変更時の再読み込み用）
let csvLastFile=null;

// エンコーディング自動判定（ArrayBufferからバイトパターンを解析）
function detectEncoding(buffer){
  const bytes=new Uint8Array(buffer);
  // BOM検出
  if(bytes.length>=3&&bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF)return{enc:'UTF-8',reason:'BOM検出(UTF-8)'};
  if(bytes.length>=2&&bytes[0]===0xFF&&bytes[1]===0xFE)return{enc:'UTF-16LE',reason:'BOM検出(UTF-16LE)'};
  // バイトパターン解析（UTF-8を優先チェック）
  let sjisScore=0,utf8Score=0,eucScore=0,asciiOnly=true;
  for(let i=0;i<bytes.length;i++){
    const b=bytes[i];
    if(b>0x7F)asciiOnly=false;
    // UTF-8 3バイト: 1110xxxx 10xxxxxx 10xxxxxx（最優先チェック）
    if((b&0xF0)===0xE0&&i+2<bytes.length&&(bytes[i+1]&0xC0)===0x80&&(bytes[i+2]&0xC0)===0x80){utf8Score+=3;i+=2;continue;}
    // UTF-8 4バイト: 11110xxx 10xxxxxx 10xxxxxx 10xxxxxx
    if((b&0xF8)===0xF0&&i+3<bytes.length&&(bytes[i+1]&0xC0)===0x80&&(bytes[i+2]&0xC0)===0x80&&(bytes[i+3]&0xC0)===0x80){utf8Score+=4;i+=3;continue;}
    // UTF-8 2バイト: 110xxxxx 10xxxxxx
    if((b&0xE0)===0xC0&&i+1<bytes.length&&(bytes[i+1]&0xC0)===0x80){utf8Score+=2;i++;continue;}
    // Shift_JIS/CP932: 第1バイト 0x81-0x9F, 0xE0-0xFC
    if((b>=0x81&&b<=0x9F)||(b>=0xE0&&b<=0xFC)){
      if(i+1<bytes.length){
        const b2=bytes[i+1];
        if((b2>=0x40&&b2<=0x7E)||(b2>=0x80&&b2<=0xFC)){sjisScore+=2;i++;continue;}
      }
    }
    // 半角カナ (Shift_JIS): 0xA1-0xDF
    if(b>=0xA1&&b<=0xDF)sjisScore++;
    // EUC-JP: 0xA1-0xFE 0xA1-0xFE
    if(b>=0xA1&&b<=0xFE&&i+1<bytes.length&&bytes[i+1]>=0xA1&&bytes[i+1]<=0xFE){eucScore+=2;i++;continue;}
  }
  if(asciiOnly)return{enc:'UTF-8',reason:'ASCII'};
  // スコア判定（UTF-8を優先）
  if(utf8Score>0&&utf8Score>=sjisScore)return{enc:'UTF-8',reason:`UTF-8(スコア:${utf8Score})`};
  if(sjisScore>utf8Score&&sjisScore>eucScore)return{enc:'Shift_JIS',reason:`Shift_JIS(スコア:${sjisScore})`};
  if(eucScore>0)return{enc:'EUC-JP',reason:`EUC-JP(スコア:${eucScore})`};
  return{enc:'UTF-8',reason:'デフォルト(UTF-8)'};
}

function loadCsvFile(input){const f=input.files[0];if(!f)return;
  csvLastFile=f;
  const selectedEnc=document.getElementById('csvEncoding').value;
  if(selectedEnc!=='auto'){
    // 手動指定
    const r=new FileReader();
    r.onload=e=>{document.getElementById('csvData').value=e.target.result;document.getElementById('csvEncodingInfo').textContent='📄 '+selectedEnc+'で読み込みました';previewCsv();};
    r.readAsText(f,selectedEnc);
    return;
  }
  // 自動判定: ArrayBufferで読み込んでバイトパターンを解析
  const r=new FileReader();
  r.onload=e=>{
    const det=detectEncoding(e.target.result);
    document.getElementById('csvEncodingInfo').textContent='📄 エンコーディング自動判定: '+det.reason;
    const r2=new FileReader();
    r2.onload=e2=>{
      let text=e2.target.result;
      // BOM除去
      if(text.charCodeAt(0)===0xFEFF)text=text.substring(1);
      // 文字化けチェック（U+FFFDが多ければSJISでリトライ）
      if(det.enc==='UTF-8'&&(text.match(/\uFFFD/g)||[]).length>2){
        document.getElementById('csvEncodingInfo').textContent='📄 UTF-8で文字化け検出→Shift_JISでリトライ';
        const r3=new FileReader();
        r3.onload=e3=>{document.getElementById('csvData').value=e3.target.result;previewCsv();};
        r3.readAsText(f,'Shift_JIS');
        return;
      }
      document.getElementById('csvData').value=text;previewCsv();
    };
    r2.readAsText(f,det.enc);
  };
  r.readAsArrayBuffer(f);
}

// CSVヘッダーのカラム名マッピング
const csvHeaderMap={
  '名前':'name','お名前':'name','氏名':'name','顧客名':'name','name':'name','姓名':'name','フルネーム':'name','お客様名':'name',
  '電話':'phone','電話番号':'phone','tel':'phone','phone':'phone','携帯':'phone','携帯番号':'phone','連絡先':'phone',
  'メモ':'memo','備考':'memo','memo':'memo','note':'memo','notes':'memo','コメント':'memo','症状':'memo','主訴':'memo',
  '誕生日':'birthday','生年月日':'birthday','birthday':'birthday','birth':'birthday','dob':'birthday',
  'メール':'email','email':'email','mail':'email','メールアドレス':'email',
  // 回数券関連
  '会員番号':'memberId','会員no':'memberId','会員ＮＯ':'memberId','memberid':'memberId',
  'ﾁｹｯﾄ設定回数':'ticketTotal','チケット設定回数':'ticketTotal','設定回数':'ticketTotal','回数':'ticketTotal',
  'ﾁｹｯﾄ残回数':'ticketRemain','チケット残回数':'ticketRemain','残回数':'ticketRemain','残り':'ticketRemain',
  'ﾁｹｯﾄ消化回数':'ticketUsed','チケット消化回数':'ticketUsed','消化回数':'ticketUsed',
  '最終消化日':'lastVisit','最終来店日':'lastVisit','最終来店':'lastVisit','最終利用日':'lastVisit',
  '設定金額':'totalPrice','金額':'totalPrice','消化金額':'usedPrice','役務残':'remainPrice',
};

function parseCsvData(){
  const raw=document.getElementById('csvData').value.trim();
  if(!raw)return[];
  const lines=raw.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  // ダブルクォート対応のCSVパース
  function parseLine(line){
    const row=[];let inQ=false,field='';
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(inQ){if(ch==='"'&&i+1<line.length&&line[i+1]==='"'){field+='"';i++;}else if(ch==='"'){inQ=false;}else{field+=ch;}}
      else{if(ch==='"'){inQ=true;}else if(ch===','||ch==='\t'){row.push(field.trim());field='';}else{field+=ch;}}
    }
    row.push(field.trim());
    return row;
  }
  // ヘッダー行の検出
  const firstRow=parseLine(lines[0]);
  let colMap=null,start=0;
  let hitCount=0;
  const tempMap={};
  firstRow.forEach((cell,idx)=>{
    // 半角カナ→全角カナ変換してからマッチ
    const key=cell.replace(/[\s_]/g,'');
    if(csvHeaderMap[key]||csvHeaderMap[cell]){hitCount++;tempMap[idx]=csvHeaderMap[key]||csvHeaderMap[cell];}
  });
  if(hitCount>=2){colMap=tempMap;start=1;}
  else{
    colMap={0:'name',1:'phone',2:'memo',3:'birthday'};
  }
  // データ行をパース
  const items=[];
  for(let i=start;i<lines.length;i++){
    const row=parseLine(lines[i]);
    if(row.length===1&&!row[0])continue;
    const item={name:'',phone:'',memo:'',birthday:'',memberId:'',ticketTotal:0,ticketRemain:0,ticketUsed:0,lastVisit:'',totalPrice:0};
    for(const idx in colMap){
      const field=colMap[idx];
      const val=row[idx]||'';
      if(field==='email'){item.memo=item.memo?(item.memo+' / '+val):val;}
      else if(field==='ticketTotal'){item.ticketTotal=parseInt(val.replace(/,/g,''))||0;}
      else if(field==='ticketRemain'){item.ticketRemain=parseInt(val.replace(/,/g,''))||0;}
      else if(field==='ticketUsed'){item.ticketUsed=parseInt(val.replace(/,/g,''))||0;}
      else if(field==='totalPrice'){item.totalPrice=parseInt(val.replace(/,/g,''))||0;}
      else if(field==='usedPrice'||field==='remainPrice'){/* 情報として無視でOK */}
      else if(field==='memberId'){item.memberId=val;}
      else if(field==='lastVisit'){item.lastVisit=val;}
      else if(item[field]!==undefined){item[field]=val;}
    }
    // 会員番号をメモに追加
    if(item.memberId){item.memo=item.memo?('会員:'+item.memberId+' / '+item.memo):('会員:'+item.memberId);}
    if(item.name)items.push(item);
  }
  return items;
}

function previewCsv(){const items=parseCsvData();if(!items.length){document.getElementById('csvPreview').innerHTML='';return;}
  const hasTicket=items.some(it=>it.ticketTotal>0);
  let h=`<div style="font-size:11px;color:var(--text2);margin-bottom:4px">${items.length}件${hasTicket?' 🎫回数券データ含む':''}：</div><div style="max-height:160px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px">`;
  items.slice(0,20).forEach(it=>{h+=`<div style="font-size:10px;padding:3px 0;border-bottom:1px solid var(--border)"><b>${esc(it.name)}</b>${it.phone?' ・📞'+esc(it.phone):''}${it.ticketTotal?' ・🎫'+it.ticketTotal+'回(残'+it.ticketRemain+')':''}${it.lastVisit?' ・🕐'+it.lastVisit:''}${it.memo&&!it.memberId?' ・📝'+esc(it.memo.substring(0,15)):''}</div>`;});
  if(items.length>20)h+=`<div style="font-size:9px;color:var(--text3)">...他${items.length-20}件</div>`;
  document.getElementById('csvPreview').innerHTML=h+'</div>';}

async function doCsvImport(){const items=parseCsvData();if(!items.length){document.getElementById('csvError').textContent='インポートするデータがありません';return;}
  if(!confirm(items.length+'件をインポートしますか？'))return;
  const r=await api(apiBase()+'/bulk-import','POST',{items});
  if(r.error){document.getElementById('csvError').textContent=r.error;return;}
  let msg=`${r.added}件登録！`;if(r.errors?.length)msg+=`\n${r.errors.length}件スキップ`;
  alert(msg);closeModal('csv');await load();}
document.getElementById('csvData')?.addEventListener('input',previewCsv);

// モーダル
function openModal(n){document.getElementById(n+'Overlay').classList.add('show');document.getElementById(n+'Modal').classList.add('show');}
function closeModal(n){document.getElementById(n+'Overlay').classList.remove('show');document.getElementById(n+'Modal').classList.remove('show');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ===== ログアウト =====
function logout(){authToken='';localStorage.removeItem('cp_token_'+roomId);backToTop();}

// ===== URL共有 =====
function shareStoreUrl(){
  const url=location.origin+'/store/'+roomId;
  if(navigator.share){navigator.share({title:D.name||'回数券管理',url}).catch(()=>{});}
  else{navigator.clipboard?.writeText(url);alert('URLをコピーしました\n'+url);}
}

// ===== CSVエクスポート修正 =====
function exportCsv(type){
  fetch(`${apiBase()}/export?type=${type}`,{headers:{'X-Auth-Token':authToken}})
  .then(r=>r.blob()).then(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=type+'_'+new Date().toISOString().split('T')[0]+'.csv';a.click();});
}

async function saveLineConfig(){
  const token=document.getElementById('lineToken').value.trim();
  const secret=document.getElementById('lineSecret').value.trim();
  if(!token){alert('Access Token\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');return;}
  const r=await api(apiBase()+'/line/config','POST',{channelAccessToken:token,channelSecret:secret});
  if(r.error){alert(r.error);return;}
  alert('\u4fdd\u5b58\u3057\u307e\u3057\u305f\uff01\n\nWebhook URL:\n'+r.webhookUrl+'\n\n\u3053\u306eURL\u3092LINE Developers Console\u306b\u8a2d\u5b9a\u3057\u3066\u304f\u3060\u3055\u3044');
  closeModal('config');await load();

// ===== メンバー管理（管理者のみ） =====
async function openMemberManage(){
  document.getElementById('configTitle').textContent='\ud83d\udc65 \u30e1\u30f3\u30d0\u30fc\u7ba1\u7406';
  document.getElementById('configBody').innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">\u8aad\u307f\u8fbc\u307f\u4e2d...</div>';
  openModal('config');
  const r=await api(apiBase()+'/members');
  const members=r.members||[];
  let h=`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">${members.length}\u540d\u306e\u30e1\u30f3\u30d0\u30fc</div>`;
  members.forEach(m=>{
    const isMe=m.deviceId===deviceId;
    const roleLabel=m.role==='admin'?'<span style="color:var(--accent);font-size:9px;font-weight:700">\ud83d\udc51 \u7ba1\u7406\u8005</span>':'<span style="font-size:9px;color:var(--text3)">\u30b9\u30bf\u30c3\u30d5</span>';
    h+=`<div style="padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px${isMe?';border-color:var(--accent)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><b style="font-size:13px">${esc(m.name)}${isMe?' (\u81ea\u5206)':''}</b><div style="font-size:9px;color:var(--text3)">\u6700\u7d42: ${m.lastSeen?.split('T')[0]||'-'} ${roleLabel}</div></div>
        <div style="display:flex;gap:4px">`;
    if(m.role!=='admin'&&!isMe){
      h+=`<button style="padding:4px 8px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);border-radius:6px;color:var(--accent);font-size:9px;cursor:pointer" onclick="transferAdmin('${m.deviceId}','\u0027+esc(m.name)+\u0027')">\ud83d\udc51 \u7ba1\u7406\u8005\u306b</button>`;
      h+=`<button style="padding:4px 8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:6px;color:var(--red);font-size:9px;cursor:pointer" onclick="removeMember('${m.deviceId}')">\u524a\u9664</button>`;
    }
    h+=`</div></div></div>`;
  });

async function transferAdmin(targetDeviceId,name){
  if(!confirm(name+'\u3055\u3093\u306b\u7ba1\u7406\u8005\u6a29\u9650\u3092\u8b72\u6e21\u3057\u307e\u3059\u304b\uff1f\n\u203b \u3042\u306a\u305f\u306f\u30b9\u30bf\u30c3\u30d5\u306b\u306a\u308a\u307e\u3059'))return;
  const r=await api(apiBase()+'/transfer-admin','POST',{newAdminDeviceId:targetDeviceId});
  if(r.error){alert(r.error);return;}
  alert(r.newAdmin+'\u3055\u3093\u304c\u65b0\u3057\u3044\u7ba1\u7406\u8005\u306b\u306a\u308a\u307e\u3057\u305f');
  myRole='staff';closeModal('config');await load();
}
async function removeMember(targetDeviceId){
  if(!confirm('\u3053\u306e\u30e1\u30f3\u30d0\u30fc\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f'))return;
  await api(apiBase()+'/member/remove','POST',{deviceId:targetDeviceId});
  alert('\u524a\u9664\u3057\u307e\u3057\u305f');openMemberManage();
}

async function linkLineFriend(userId){
  const sel=document.getElementById('link_'+userId.replace(/[^a-zA-Z0-9]/g,''));

  const r=await api(apiBase()+'/line/link','POST',{lineUserId:userId,cid});
  if(r.error){alert(r.error);return;}
  alert('\u30ea\u30f3\u30af\u3057\u307e\u3057\u305f');openLineFriends();
}

// 休眠顧客リマインド
async function sendDormantReminder(){
  const a=D.alerts||{};
  const dormant=[...(a.month3||[]),...(a.month6||[])];
  if(!dormant.length){alert('\u4f11\u7720\u9867\u5ba2\u304c\u3044\u307e\u305b\u3093');return;}
  // LINE\u30ea\u30f3\u30af\u6e08\u307f\u306e\u4f11\u7720\u9867\u5ba2\u3092\u7279\u5b9a
  const friends=(await api(apiBase()+'/line/friends')).friends||[];
  const linkedDormant=dormant.filter(c=>friends.find(f=>f.linked===c.cid));
  if(!linkedDormant.length){
    alert(`\u4f11\u7720\u9867\u5ba2${dormant.length}\u540d\u304c\u3044\u307e\u3059\u304c\u3001LINE\u30ea\u30f3\u30af\u6e08\u307f\u304c0\u540d\u3067\u3059\u3002\n\u8a2d\u5b9a > LINE\u53cb\u3060\u3061\u4e00\u89a7 \u3067\u9867\u5ba2\u3068\u30ea\u30f3\u30af\u3057\u3066\u304f\u3060\u3055\u3044`);
    return;
  }
  if(!confirm(`${linkedDormant.length}\u540d\u306e\u4f11\u7720\u9867\u5ba2\u306bLINE\u30ea\u30de\u30a4\u30f3\u30c9\u3092\u9001\u4fe1\u3057\u307e\u3059\u304b\uff1f`))return;
  const r=await api(apiBase()+'/line/send-dormant','POST',{});
  if(r.error){alert(r.error);return;}
  alert(`\u2705 ${r.sent||0}\u540d\u306b\u30ea\u30de\u30a4\u30f3\u30c9\u9001\u4fe1\u3057\u307e\u3057\u305f`);
}

// 期限切れ通知

  const a=D.alerts||{};
  const expiring=a.expiring||[];
  if(!expiring.length){alert('\u671f\u9650\u5207\u308c\u9593\u8fd1\u306e\u56de\u6570\u5238\u306f\u3042\u308a\u307e\u305b\u3093');return;}

    alert(`\u671f\u9650\u5207\u308c\u9593\u8fd1${expiring.length}\u4ef6\u3042\u308a\u307e\u3059\u304c\u3001LINE\u30ea\u30f3\u30af\u6e08\u307f\u304c0\u4ef6\u3067\u3059`);
    return;
  }
  if(!confirm(`${linkedExp.length}\u540d\u306b\u671f\u9650\u5207\u308c\u901a\u77e5\u3092\u9001\u4fe1\u3057\u307e\u3059\u304b\uff1f`))return;
  const r=await api(apiBase()+'/line/send-expiry','POST',{});
  if(r.error){alert(r.error);return;}
  alert(`\u2705 ${r.sent||0}\u540d\u306b\u671f\u9650\u901a\u77e5\u3092\u9001\u4fe1\u3057\u307e\u3057\u305f`);
}

// PWAインストールプロンプト
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  // インストールボタンを表示
  const btn=document.getElementById('installBtnLogin');
  if(btn)btn.style.display='block';
});
window.addEventListener('appinstalled',()=>{
  deferredPrompt=null;
  const btn=document.getElementById('installBtnLogin');
  if(btn)btn.style.display='none';
});
function doInstall(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r=>{
    if(r.outcome==='accepted'){
      const btn=document.getElementById('installBtnLogin');
      if(btn)btn.style.display='none';
    }
    deferredPrompt=null;
  });
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
checkAuth();
